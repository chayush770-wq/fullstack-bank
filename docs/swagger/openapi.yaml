openapi: 3.0.0

info:
  title: Web Banking API
  version: 1.0.0
  description: REST API for the Web Banking Application

servers:
  - url: http://localhost:3000/api


# ===== TAGS =====
tags:
  - name: Auth
    description: Registration, verification, and login

  - name: Accounts
    description: Current authenticated account data

  - name: Transactions
    description: Transaction history and money transfers


# ===== PATHS =====
paths:

  # ===== AUTH =====

  /auth/register:
    post:
      tags:
        - Auth
      summary: Register new user
      description: Create an unverified user and send a verification email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Verification email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Missing or invalid field
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


  /auth/verify:
    get:
      tags:
        - Auth
      summary: Verify account
      description: Validate verification token, activate account, and return JWT.
      parameters:
        - name: token
          in: query
          required: true
          description: Verification token from email link
          schema:
            type: string
      responses:
        '200':
          description: Account verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Token missing, malformed, or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No user found for this token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


  /auth/login:
    post:
      tags:
        - Auth
      summary: Login user
      description: Authenticate email and password, then return JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Wrong credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Account not verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


  # ===== ACCOUNTS =====

  /accounts/me:
    get:
      tags:
        - Accounts
      summary: Get current account data
      description: Return current user balance and paginated recent transactions.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Current account data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountMeResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


  # ===== TRANSACTIONS =====

  /transactions:
    get:
      tags:
        - Transactions
      summary: Get transaction list
      description: Return paginated transactions, optionally filtered by counterparty email.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: counterparty
          in: query
          required: false
          description: Filter transactions by counterparty email
          schema:
            type: string
            format: email
      responses:
        '200':
          description: Transaction list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionsResponse'
        '400':
          description: Invalid page or limit value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Transactions
      summary: Transfer money
      description: Transfer money from authenticated user to another registered user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '201':
          description: Transfer completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferResponse'
        '400':
          description: Invalid amount, insufficient balance, self-transfer, or reason too long
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Recipient not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


# ===== COMPONENTS =====
components:

  # ===== SECURITY =====
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT


  # ===== PARAMETERS =====
  parameters:

    PageParam:
      name: page
      in: query
      required: false
      description: Page number
      schema:
        type: integer
        default: 1
        minimum: 1

    LimitParam:
      name: limit
      in: query
      required: false
      description: Number of items per page
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 50


  # ===== SCHEMAS =====
  schemas:

    # ===== COMMON =====

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Human-readable error message

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: Verification email sent to user@example.com


    # ===== AUTH =====

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - phone
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: StrongPass123!
        phone:
          type: string
          example: "+972501234567"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: StrongPass123!

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          $ref: '#/components/schemas/UserSummary'


    # ===== USER SUMMARY =====

    UserSummary:
      type: object
      properties:
        id:
          type: string
          example: 65f1a9b4c2e8a123456789ab
        email:
          type: string
          format: email
          example: user@example.com
        balance:
          type: number
          example: 4250.00


    # ===== ACCOUNTS =====

    AccountMeResponse:
      type: object
      properties:
        balance:
          type: number
          example: 4250.00
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        pagination:
          $ref: '#/components/schemas/Pagination'


    # ===== TRANSACTIONS =====

    Transaction:
      type: object
      properties:
        id:
          type: string
          example: t_001
        counterpartyEmail:
          type: string
          format: email
          example: bob@example.com
        amount:
          type: number
          example: -150.00
        reason:
          type: string
          example: Rent
        date:
          type: string
          format: date-time
          example: 2024-06-01T14:30:00Z

    TransactionsResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        pagination:
          $ref: '#/components/schemas/Pagination'

    TransferRequest:
      type: object
      required:
        - recipientEmail
        - amount
      properties:
        recipientEmail:
          type: string
          format: email
          example: bob@example.com
        amount:
          type: number
          example: 150
        reason:
          type: string
          maxLength: 200
          example: Rent

    TransferResponse:
      type: object
      properties:
        message:
          type: string
          example: Transfer completed successfully
        newBalance:
          type: number
          example: 4100.00
        transaction:
          $ref: '#/components/schemas/Transaction'


    # ===== PAGINATION =====

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          example: 34
        totalPages:
          type: integer
          example: 4